// SimpleGuard service for basic signing and verification
syntax = "proto3";

package capiscio.v1;

option go_package = "github.com/capiscio/capiscio-core/pkg/rpc/gen/capiscio/v1";

import "capiscio/v1/common.proto";
import "capiscio/v1/trust.proto";

// SimpleGuardService provides simplified signing and verification
service SimpleGuardService {
  // Sign a message
  rpc Sign(SignRequest) returns (SignResponse);
  
  // Verify a signed message
  rpc Verify(VerifyRequest) returns (VerifyResponse);
  
  // Sign with attached payload (creates JWS)
  rpc SignAttached(SignAttachedRequest) returns (SignAttachedResponse);
  
  // Verify with attached payload
  rpc VerifyAttached(VerifyAttachedRequest) returns (VerifyAttachedResponse);
  
  // Generate a new key pair
  rpc GenerateKeyPair(GenerateKeyPairRequest) returns (GenerateKeyPairResponse);
  
  // Load key from file
  rpc LoadKey(LoadKeyRequest) returns (LoadKeyResponse);
  
  // Export key to file
  rpc ExportKey(ExportKeyRequest) returns (ExportKeyResponse);
  
  // Get key info
  rpc GetKeyInfo(GetKeyInfoRequest) returns (GetKeyInfoResponse);
  
  // Initialize agent identity (Let's Encrypt style one-call setup)
  // Generates key pair, derives DID, registers with server, creates agent card
  rpc Init(InitRequest) returns (InitResponse);

  // RFC-008: Create a root Authority Envelope (§6.1)
  rpc CreateEnvelope(CreateEnvelopeRequest) returns (CreateEnvelopeResponse);

  // RFC-008: Derive a child Authority Envelope from a parent (§6.3)
  rpc DeriveEnvelope(DeriveEnvelopeRequest) returns (DeriveEnvelopeResponse);

  // RFC-008: Build transport headers for a delegation chain (§15.1–§15.3)
  rpc BuildTransportHeaders(BuildTransportHeadersRequest) returns (BuildTransportHeadersResponse);

  // RFC-008: Verify an Authority Envelope chain (§9.2)
  rpc VerifyEnvelopeChain(VerifyEnvelopeChainRequest) returns (VerifyEnvelopeChainResponse);
}

// Signature format
enum SignatureFormat {
  SIGNATURE_FORMAT_UNSPECIFIED = 0;
  SIGNATURE_FORMAT_JWS_COMPACT = 1;
  SIGNATURE_FORMAT_JWS_JSON = 2;
  SIGNATURE_FORMAT_RAW = 3;
}

// Request to sign
message SignRequest {
  bytes payload = 1;
  string key_id = 2;              // Key to use for signing
  SignatureFormat format = 3;
  map<string, string> headers = 4;  // Additional JWS headers
}

// Response with signature
message SignResponse {
  bytes signature = 1;
  string signature_string = 2;    // String form if applicable
  string error_message = 3;
}

// Request to verify
message VerifyRequest {
  bytes payload = 1;
  bytes signature = 2;
  string signature_string = 3;    // Alternative to bytes
  string expected_signer = 4;     // Optional: expected signer DID
}

// Response for verification
message VerifyResponse {
  bool valid = 1;
  string signer_did = 2;          // Extracted signer DID
  string key_id = 3;              // Key used for verification
  ValidationResult validation = 4;
  string error_message = 5;
}

// Request to sign with attached payload
message SignAttachedRequest {
  bytes payload = 1;
  string key_id = 2;
  SignatureFormat format = 3;
  map<string, string> headers = 4;
  bool detach_payload = 5;        // Whether to detach payload from JWS
}

// Response with attached signature
message SignAttachedResponse {
  string jws = 1;                 // Complete JWS
  string error_message = 2;
}

// Request to verify attached
message VerifyAttachedRequest {
  string jws = 1;
  bytes detached_payload = 2;     // If payload was detached
  string expected_signer = 3;
}

// Response for attached verification
message VerifyAttachedResponse {
  bool valid = 1;
  bytes payload = 2;              // Extracted payload
  string signer_did = 3;
  string key_id = 4;
  ValidationResult validation = 5;
  string error_message = 6;
}

// Request to generate key pair
message GenerateKeyPairRequest {
  KeyAlgorithm algorithm = 1;
  string key_id = 2;              // Optional: specific key ID
  map<string, string> metadata = 3;
}

// Response with generated keys
message GenerateKeyPairResponse {
  string key_id = 1;
  bytes public_key = 2;
  bytes private_key = 3;
  string public_key_pem = 4;
  string private_key_pem = 5;
  KeyAlgorithm algorithm = 6;
  string error_message = 7;
  string did_key = 8;  // did:key URI derived from public key (RFC-002 §6.1)
}

// Request to load key
message LoadKeyRequest {
  string file_path = 1;
  KeyFormat format = 2;
  string passphrase = 3;          // Optional: for encrypted keys
}

// Response for load key
message LoadKeyResponse {
  string key_id = 1;
  KeyAlgorithm algorithm = 2;
  bool has_private_key = 3;
  string error_message = 4;
}

// Request to export key
message ExportKeyRequest {
  string key_id = 1;
  string file_path = 2;
  KeyFormat format = 3;
  bool include_private = 4;
  string passphrase = 5;          // Optional: encrypt private key
}

// Response for export
message ExportKeyResponse {
  string file_path = 1;
  string error_message = 2;
}

// Request for key info
message GetKeyInfoRequest {
  string key_id = 1;
}

// Response with key info
message GetKeyInfoResponse {
  string key_id = 1;
  KeyAlgorithm algorithm = 2;
  bool has_private_key = 3;
  bytes public_key = 4;
  string public_key_pem = 5;
  Timestamp created_at = 6;
  map<string, string> metadata = 7;
  string error_message = 8;
}

// Request to initialize agent identity
message InitRequest {
  string api_key = 1;             // API key for server authentication
  string agent_id = 2;            // Agent UUID to register DID for
  string server_url = 3;          // CapiscIO server URL (default: https://api.capisc.io)
  string output_dir = 4;          // Directory for generated files (default: .capiscio)
  bool force = 5;                 // Overwrite existing files
  KeyAlgorithm algorithm = 6;     // Key algorithm (default: Ed25519)
  map<string, string> metadata = 7;  // Additional metadata for agent card
}

// Response from init
message InitResponse {
  string did = 1;                 // Generated did:key URI
  string agent_id = 2;            // Registered agent ID
  string private_key_path = 3;    // Path to private key file
  string public_key_path = 4;     // Path to public key file
  string agent_card_path = 5;     // Path to agent card JSON
  string agent_card_json = 6;     // Agent card contents as JSON string
  bool registered = 7;            // Whether DID was registered with server
  string error_message = 8;       // Error if any
}

// ============================================================================
// RFC-008: Authority Envelope Operations
// ============================================================================

// Request to create a root Authority Envelope
message CreateEnvelopeRequest {
  string key_id = 1;                    // Key to sign with (from key store)
  string subject_did = 2;               // DID of the agent receiving authority
  string capability_class = 3;          // e.g., "tools.database.read"
  int32 delegation_depth_remaining = 4; // How many further delegations allowed
  string txn_id = 5;                    // Transaction ID (RFC-004); auto-generated if empty
  int64 expires_in_seconds = 6;         // TTL from now (default: 3600)
  string constraints_json = 7;          // Optional JSON constraints object
  string issuer_badge_jti = 8;          // JTI of the issuer's badge
  string subject_badge_jti = 9;         // JTI of the subject's badge (optional)
  string enforcement_mode_min = 10;     // Optional minimum enforcement mode
}

// Response with signed root envelope
message CreateEnvelopeResponse {
  string envelope_jws = 1;              // JWS Compact Serialization
  string envelope_id = 2;               // Generated envelope UUID
  string issuer_did = 3;                // DID derived from signing key
  string error_message = 4;
}

// Request to derive a child envelope from a parent
message DeriveEnvelopeRequest {
  string parent_envelope_jws = 1;       // Parent envelope JWS (will be parsed + hash-linked)
  string key_id = 2;                    // Key to sign child with
  string subject_did = 3;               // DID of the next delegate
  string capability_class = 4;          // Must be equal or narrower than parent
  int32 delegation_depth_remaining = 5; // Must be < parent's depth
  int64 expires_in_seconds = 6;         // TTL from now (must be <= parent expiry)
  string constraints_json = 7;          // Must be equal or more restrictive
  string subject_badge_jti = 8;         // JTI of the subject's badge
  string enforcement_mode_min = 9;      // Optional minimum enforcement mode
  string issuer_badge_jti = 10;         // JTI of the child issuer's own badge (NOT inherited from parent)
}

// Response with signed derived envelope
message DeriveEnvelopeResponse {
  string envelope_jws = 1;              // JWS Compact Serialization of child
  string envelope_id = 2;               // Generated envelope UUID
  string parent_authority_hash = 3;     // SHA-256 hash linking to parent
  string error_message = 4;
}

// Request to build transport headers for a delegation chain
message BuildTransportHeadersRequest {
  repeated string chain = 1;            // Ordered JWS array [root, ..., leaf]
  map<string, string> badge_map = 2;    // DID -> badge JWS for intermediate agents
}

// Response with encoded transport headers
message BuildTransportHeadersResponse {
  string authority_header = 1;          // X-Capiscio-Authority value (leaf JWS)
  string authority_chain_header = 2;    // X-Capiscio-Authority-Chain value (base64url JSON array)
  string badge_map_header = 3;          // X-Capiscio-Badge-Map value (base64url JSON object)
  string error_message = 4;
}

// Request to verify an envelope chain
message VerifyEnvelopeChainRequest {
  repeated string chain = 1;            // Ordered JWS array [root, ..., leaf]
  map<string, string> badge_map = 2;    // DID -> badge JWS
  repeated string trusted_issuers = 3;  // Trusted issuer DIDs (optional)
  string enforcement_mode = 4;          // Enforcement mode for verification
}

// Response from chain verification
message VerifyEnvelopeChainResponse {
  bool valid = 1;
  string root_capability = 2;
  string leaf_capability = 3;
  int32 total_depth = 4;
  string leaf_issuer_did = 5;
  string leaf_subject_did = 6;
  string error_code = 7;                // RFC-008 section 9.3 error code (on failure)
  string error_message = 8;
}
