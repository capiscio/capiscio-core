name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  protobuf:
    name: Verify Protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.50.0
      - name: Verify generated protobuf files are up to date
        run: |
          make proto
          if ! git diff --quiet -- pkg/rpc/gen/; then
            echo "❌ Generated protobuf files are out of date"
            echo "Run 'make proto' and commit the changes"
            git diff --stat -- pkg/rpc/gen/
            exit 1
          fi
          echo "✅ Generated protobuf files are up to date"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          args: --config=.golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify Dependencies
        run: go mod verify

      - name: Build
        run: go build -tags opa_no_wasm -v ./...

      - name: Run Tests
        run: |
          # Run tests excluding generated protobuf code
          go test -tags opa_no_wasm -v -race -coverprofile=coverage.txt -covermode=atomic \
            $(go list ./pkg/... ./internal/... | grep -v /gen/)

      - name: Check Coverage Threshold
        run: |
          # Parse coverage from profile
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          
          # Check minimum threshold (64% for library code - RPC layer has integration test coverage)
          THRESHOLD=64
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets minimum threshold of $THRESHOLD%"

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          name: capiscio-core
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec (SAST)
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out gosec-results.json ./...'

      - name: Upload gosec results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec-results.json
